[project]
name = "runspec-registry"
version = "0.1.1"
description = "Read-only HTTP catalog for runspec tool instances"
readme = "README.md"
license = { text = "MIT" }
authors = [
    { name = "Jason Finestone", email = "jason@finestone.dev" }
]
requires-python = ">=3.10"
keywords = ["cli", "mcp", "tools", "registry", "agents"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

dependencies = [
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "slowapi>=0.1.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "ruff>=0.4",
    "mypy>=1.10",
]

[project.scripts]
runspec-registry = "runspec_registry.cli:main"

[project.urls]
Homepage      = "https://JasonFinestone.github.io/runspec"
Documentation = "https://JasonFinestone.github.io/runspec/registry"
Repository    = "https://github.com/JasonFinestone/runspec"
Issues        = "https://github.com/JasonFinestone/runspec/issues"

[build-system]
requires      = ["setuptools>=69.0.2", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]

[tool.setuptools.package-data]
runspec_registry = ["py.typed"]

# ── ruff ──────────────────────────────────────────────────────────────────────
[tool.ruff]
line-length = 200
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = []

# ── mypy ──────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version         = "3.11"
strict                 = true
warn_return_any        = true
warn_unused_configs    = true
disallow_untyped_defs  = true

# ── pytest ────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths    = ["tests"]
addopts      = "--cov=runspec_registry --cov-report=term-missing -v"
filterwarnings = ["error"]

[tool.coverage.run]
source = ["runspec_registry"]
omit   = ["tests/*"]
