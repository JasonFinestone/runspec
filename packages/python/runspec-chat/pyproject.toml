[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "runspec-chat"
version = "0.4.1"
requires-python = ">=3.11"
dependencies = [
    "chainlit>=2.7.0",
    "mcp>=1.0.0",
    "runspec>=0.13.1",
    "anthropic>=0.40.0",
    "pywin32>=306; sys_platform == 'win32'",
]

[project.scripts]
runspec-chat = "runspec_chat.chat:main"
setup-keys = "runspec_chat.setup_keys:main"

[project.optional-dependencies]
openai = ["openai>=1.0.0"]
dev = [
    "ruff",
    "mypy",
]

[tool.hatch.build.targets.wheel.force-include]
"runspec_chat/.chainlit" = "runspec_chat/.chainlit"
"runspec_chat/chainlit.md" = "runspec_chat/chainlit.md"