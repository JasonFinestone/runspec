name: Console Release

on:
  push:
    tags:
      - "console-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. console-v0.1.4)"
        required: true

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        if: github.event_name == 'push'
        run: |
          git fetch origin main
          git merge-base --is-ancestor ${{ github.sha }} origin/main \
            || { echo "::error::Tag must point to a commit on main — merge your PR first, then push the tag."; exit 1; }

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install UI dependencies
        working-directory: packages/console-ui
        run: npm ci

      - name: Build UI (Vite → runspec_console/dist/)
        working-directory: packages/console-ui
        run: npm run build

      - name: Build wheel
        working-directory: packages/python/runspec-console
        run: |
          pip install hatchling
          python -m hatchling build -t wheel

      - name: Wheel smoke test
        working-directory: packages/python/runspec-console
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl --no-deps
          /tmp/smoke/bin/python -c "
          from importlib.resources import files
          pkg = files('runspec_console')
          assert (pkg / 'dist' / 'index.html').is_file(), 'dist/index.html missing from wheel — run npm run build first'
          assert (pkg / 'runspec.toml').is_file(), 'runspec.toml missing from wheel'
          print('Wheel contents OK')
          "

      - name: Build sdist
        working-directory: packages/python/runspec-console
        run: python -m hatchling build -t sdist

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: packages/python/runspec-console/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/runspec-console

    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Extract changelog notes
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#console-v}"
          ESCAPED="${VERSION//./\\.}"
          awk "/^## \\[${ESCAPED}\\]/{found=1; next} found && /^---/{exit} found{print}" \
            packages