name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.17.0)"
        required: true

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python/runspec

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        if: github.event_name == 'push'
        run: |
          git fetch origin main
          git merge-base --is-ancestor ${{ github.sha }} origin/main \
            || { echo "::error::Tag must point to a commit on main — merge your PR first, then push the tag."; exit 1; }

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Wheel smoke test
        working-directory: packages/python/runspec
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/runspec --help
          /tmp/smoke/bin/python -c "
          from importlib.resources import files
          pkg = files('runspec')
          assert (pkg / 'runspec.toml').is_file(), 'runspec.toml missing from wheel'
          assert (pkg / 'py.typed').is_file(), 'py.typed missing from wheel'
          print('Wheel contents OK')
          "

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: packages/python/runspec/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/runspec

    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Extract changelog notes
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          ESCAPED="${VERSION//./\\.}"
          awk "/^## \\[${ESCAPED}\\]/{found=1; next} found && /^---/{exit} found{print}" \
            CHANGELOG.md > release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          TAG="$RELEASE_TAG"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
            gh release edit   "$TAG" --notes-file release-notes.md
          else
            gh release create "$TAG" dist/* \
              --title "$TAG" \
              --notes-file release-notes.md
          fi
