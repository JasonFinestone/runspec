name: CI

# Single CI workflow per PR so a single required check (`CI / CI`) covers both
# language packs. Internal change-detection skips irrelevant jobs while still
# reporting success on the umbrella, so a Python-only PR isn't blocked waiting
# for a Node check that never runs (and vice versa).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      node: ${{ steps.filter.outputs.node }}
      chat: ${{ steps.filter.outputs.chat }}
      linux: ${{ steps.filter.outputs.linux }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'packages/python/runspec/**'
              - 'tests/integration/**'
              - '.github/workflows/ci.yml'
            node:
              - 'packages/node/**'
              - '.github/workflows/ci.yml'
            chat:
              - 'packages/python/runspec-chat/**'
              - '.github/workflows/ci.yml'
            linux:
              - 'packages/integrations/runspec-linux/**'
              - '.github/workflows/ci.yml'

  python:
    name: Python ${{ matrix.python-version }}
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: packages/python/runspec
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Type check
        run: mypy runspec/

      - name: Run tests
        run: pytest

      - name: Build wheel
        if: matrix.python-version == '3.12'
        run: |
          pip install build
          python -m build --wheel

      - name: Wheel smoke test
        if: matrix.python-version == '3.12'
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/runspec --help
          /tmp/smoke/bin/python -c "
          from importlib.resources import files
          pkg = files('runspec')
          assert (pkg / 'runspec.toml').is_file(), 'runspec.toml missing from wheel'
          assert (pkg / 'py.typed').is_file(), 'py.typed missing from wheel'
          print('Wheel contents OK')
          "

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        if: matrix.python-version == '3.12'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  node:
    name: Node ${{ matrix.node }}
    needs: changes
    if: needs.changes.outputs.node == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: packages/node/package-lock.json

      - name: Install dependencies
        working-directory: packages/node
        run: npm ci

      - name: Type check
        working-directory: packages/node
        run: npm run typecheck

      - name: Build
        working-directory: packages/node
        run: npm run build

      - name: Test
        working-directory: packages/node
        run: npm test

  chat:
    name: runspec-chat
    needs: changes
    if: needs.changes.outputs.chat == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python/runspec-chat
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Type check
        run: mypy runspec_chat/

      - name: Run tests
        run: pytest


      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Wheel smoke test
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/runspec-chat --help
          /tmp/smoke/bin/python -c "
          from importlib.resources import files
          pkg = files('runspec_chat')
          assert (pkg / 'chainlit_config' / 'config.toml').is_file(), 'chainlit_config/config.toml missing from wheel'
          assert (pkg / 'chainlit.md').is_file(), 'chainlit.md missing from wheel'
          print('Wheel contents OK')
          "

  linux:
    name: runspec-linux
    needs: changes
    if: needs.changes.outputs.linux == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/integrations/runspec-linux
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Run tests
        run: pytest

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Wheel smoke test
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/system-info
          /tmp/smoke/bin/python -c "
          from importlib.resources import files
          pkg = files('runspec_linux')
          assert (pkg / 'runspec.toml').is_file(), 'runspec.toml missing from wheel'
          from runspec_linux import nc_send
          print('Wheel contents OK')
          "

  ci:
    name: CI
    needs: [python, node, chat, linux]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify dependent jobs
        run: |
          # Fail only on real failures or cancellations. A 'skipped' result is
          # expected and OK — it means change-detection didn't see relevant
          # files for that language pack.
          python_result='${{ needs.python.result }}'
          node_result='${{ needs.node.result }}'
          chat_result='${{ needs.chat.result }}'
          echo "python: $python_result"
          echo "node:   $node_result"
          echo "chat:   $chat_result"
          if [[ "$python_result" == "failure" || "$python_result" == "cancelled" ]]; then
            echo "Python checks failed."
            exit 1
          fi
          if [[ "$node_result" == "failure" || "$node_result" == "cancelled" ]]; then
            echo "Node checks failed."
            exit 1
          fi
          if [[ "$chat_result" == "failure" || "$chat_result" == "cancelled" ]]; then
            echo "Chat checks failed."
            exit 1
          fi
          linux_result='${{ needs.linux.result }}'
          echo "linux:  $linux_result"
          if [[ "$linux_result" == "failure" || "$linux_result" == "cancelled" ]]; then
            echo "Linux checks failed."
            exit 1
          fi
          echo "All checks passed (or were correctly skipped)."
