name: CI

# Single CI workflow per PR so a single required check (`CI / CI`) covers both
# language packs. Internal change-detection skips irrelevant jobs while still
# reporting success on the umbrella, so a Python-only PR isn't blocked waiting
# for a Node check that never runs (and vice versa).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      node: ${{ steps.filter.outputs.node }}
      chat: ${{ steps.filter.outputs.chat }}
      linux: ${{ steps.filter.outputs.linux }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            python:
              - 'packages/python/runspec/**'
              - 'tests/integration/**'
              - '.github/workflows/ci.yml'
            node:
              - 'packages/node/**'
              - '.github/workflows/ci.yml'
            chat:
              - 'packages/python/runspec-chat/**'
              - '.github/workflows/ci.yml'
            linux:
              - 'packages/python/runspec-linux/**'
              - '.github/workflows/ci.yml'

  # ── Python ──────────────────────────────────────────────────────────────────

  python-quality:
    name: "Python quality / ${{ matrix.check }}"
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [lint, format, typecheck]
    defaults:
      run:
        working-directory: packages/python/runspec
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        if: matrix.check == 'lint'
        run: ruff check .

      - name: Format check
        if: matrix.check == 'format'
        run: ruff format --check .

      - name: Type check
        if: matrix.check == 'typecheck'
        run: mypy runspec/

  python-test:
    name: "Python test / ${{ matrix.python-version }}"
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: packages/python/runspec
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Build wheel
        if: matrix.python-version == '3.12'
        run: |
          pip install build
          python -m build --wheel

      - name: Wheel smoke test
        if: matrix.python-version == '3.12'
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/runspec --help
          /tmp/smoke/bin/python -c "
          from importlib.resources import files
          pkg = files('runspec')
          assert (pkg / 'runspec.toml').is_file(), 'runspec.toml missing from wheel'
          assert (pkg / 'py.typed').is_file(), 'py.typed missing from wheel'
          print('Wheel contents OK')
          "

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        if: matrix.python-version == '3.12'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── Node ────────────────────────────────────────────────────────────────────

  node:
    name: Node ${{ matrix.node }}
    needs: changes
    if: needs.changes.outputs.node == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: packages/node/package-lock.json

      - name: Install dependencies
        working-directory: packages/node
        run: npm ci

      - name: Type check
        working-directory: packages/node
        run: npm run typecheck

      - name: Build
        working-directory: packages/node
        run: npm run build

      - name: Test
        working-directory: packages/node
        run: npm test

  # ── runspec-chat ─────────────────────────────────────────────────────────────

  chat-quality:
    name: "chat quality / ${{ matrix.check }}"
    needs: changes
    if: needs.changes.outputs.chat == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [lint, format, typecheck]
    defaults:
      run:
        working-directory: packages/python/runspec-chat
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        if: matrix.check == 'lint'
        run: ruff check .

      - name: Format check
        if: matrix.check == 'format'
        run: ruff format --check .

      - name: Type check
        if: matrix.check == 'typecheck'
        run: mypy runspec_chat/

  chat-test:
    name: runspec-chat test
    needs: changes
    if: needs.changes.outputs.chat == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python/runspec-chat
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Wheel smoke test
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/runspec-chat --help
          /tmp/smoke/bin/python -c "
          from importlib.resources import files
          pkg = files('runspec_chat')
          assert (pkg / 'chainlit_config' / 'config.toml').is_file(), 'chainlit_config/config.toml missing from wheel'
          assert (pkg / 'chainlit.md').is_file(), 'chainlit.md missing from wheel'
          print('Wheel contents OK')
          "

  # ── runspec-linux ─────────────────────────────────────────────────────────

  linux-quality:
    name: "linux quality / ${{ matrix.check }}"
    needs: changes
    if: needs.changes.outputs.linux == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [lint, format]
    defaults:
      run:
        working-directory: packages/python/runspec-linux
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        if: matrix.check == 'lint'
        run: ruff check .

      - name: Format check
        if: matrix.check == 'format'
        run: ruff format --check .

  linux-test:
    name: runspec-linux test
    needs: changes
    if: needs.changes.outputs.linux == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python/runspec-linux
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Wheel smoke test
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/system-info
          /tmp/smoke/bin/python -c "
          from importlib.resources import files
          pkg = files('runspec_linux')
          assert (pkg / 'runspec.toml').is_file(), 'runspec.toml missing from wheel'
          from runspec_linux import nc_send
          print('Wheel contents OK')
          "

  # ── Aggregator ───────────────────────────────────────────────────────────────

  ci:
    name: CI
    needs: [python-quality, python-test, node, chat-quality, chat-test, linux-quality, linux-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify dependent jobs
        run: |
          # Fail only on real failures or cancellations. A 'skipped' result is
          # expected and OK — it means change-detection didn't see relevant
          # files for that language pack.
          fail=0
          check() {
            local name="$1" result="$2"
            echo "$name: $result"
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              fail=1
            fi
          }
          check "python-quality" "${{ needs.python-quality.result }}"
          check "python-test"    "${{ needs.python-test.result }}"
          check "node"           "${{ needs.node.result }}"
          check "chat-quality"   "${{ needs.chat-quality.result }}"
          check "chat-test"      "${{ needs.chat-test.result }}"
          check "linux-quality"  "${{ needs.linux-quality.result }}"
          check "linux-test"     "${{ needs.linux-test.result }}"
          if [[ $fail -eq 1 ]]; then
            echo "One or more checks failed."
            exit 1
          fi
          echo "All checks passed (or were correctly skipped)."
