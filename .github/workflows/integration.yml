name: Integration

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Runs compliance tests across all implemented language packs.
# Each pack must produce identical results for every fixture.
jobs:
  python-compliance:
    name: Python compliance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run compliance tests
        run: pytest ../../tests/integration/

  # node-compliance:  # Uncomment when runspec-node is implemented
  # go-compliance:    # Uncomment when runspec-go is implemented
