site_name: runspec
site_url: https://JasonFinestone.github.io/runspec
repo_url: https://github.com/JasonFinestone/runspec
repo_name: JasonFinestone/runspec

theme:
  name: material
  palette:
    primary: indigo

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Format Reference: format.md
  - Logging: logging.md
  - Python Library: python.md
  - Node Library: node.md
  - CLI Reference: cli.md
  - Agent Integration: agents.md
  - Jump Hosts: jump-hosts.md
  - Changelog: changelog.md
